<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mitra AI</title>
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
<!-- FontAwesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-p+uqu9+5sm5Q7CZZrVSu2fVvulaHYodNs/WS+uJeayQMZT6X0hgqP/d9vywgqbiZ9erjRzNK7T8e1S0Y+q5r/Q==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">

    <div class="logo">MITRA AI</div>

    <div class="nav-btns">
        <button onclick="togglePanel('aboutPanel')"><i class="fas fa-info-circle"></i> About</button>
        <button onclick="togglePanel('historyPanel')"><i class="fas fa-history"></i> History</button>
    </div>

</header>


<!-- CENTER -->
<div class="center">

    <div id="orb"><i class="fas fa-microphone"></i></div>
    <p id="status">Click orb to speak</p>

</div>


<!-- COLOR BOX -->
<div class="theme-box">

    <label>Orb Color</label>
    <input type="color" id="colorPicker">
    <button id="resetTheme">Reset</button>

</div>


<!-- ABOUT PANEL -->
<div id="aboutPanel" class="panel">

    <h2><i class="fas fa-info-circle"></i> About Mitra</h2>

    <p>
        Advanced voice assistant built by <strong>Smaran Bhatt</strong>.<br><br>
        Designed for automation, AI interaction & voice control systems.
    </p>

</div>


<!-- HISTORY PANEL -->
<div id="historyPanel" class="panel">

    <h2><i class="fas fa-history"></i> History</h2>
    <div id="historyList"></div>

</div>


<script src="/static/script.js"></script>
</body>
</html>
